<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLens | Clinical Diagnostic Tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>NeuroLens <span class="badge">PRO</span></h1>
            </div>
            <p class="subtitle">AI-Assisted Projective Drawing Analysis for Clinical Phenotyping.</p>
        </header>

        <div class="workspace">
            <div id="scanner" class="hidden"></div>
            <canvas id="canvas" width="700" height="420"></canvas>
        </div>

        <div class="controls">
            <button id="analyzeBtn">Run Diagnostic Scan</button>
            <button id="clearBtn">Clear Session</button>
        </div>

        <div id="results" class="analysis-box hidden">
            <div class="status-header">
                <h2>Clinical Assessment Report</h2>
                <span id="timestamp"></span>
            </div>
            <div id="analysis-content">
                <p id="analysis">Initializing neural pathways...</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
