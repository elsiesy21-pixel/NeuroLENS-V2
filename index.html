<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MindSketch AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<h1>MindSketch</h1>

<p class="subtitle">
Draw freely and let an AI psychologist interpret your mind.
</p>

</header>

<div class="workspace">

<canvas id="canvas" width="700" height="420"></canvas>

</div>

<div class="controls">

<button id="analyzeBtn">Analyze Drawing</button>

<button id="clearBtn">Clear</button>

</div>

<div class="analysis-box">

<h2>AI Analysis</h2>

<p id="analysis">
Draw something and press Analyze to receive interpretation.
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
